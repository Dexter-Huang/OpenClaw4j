name: Backend Native Experiment

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-native.yml"
      - "OpenClaw4j-Bankend/**"
  pull_request:
    paths:
      - ".github/workflows/backend-native.yml"
      - "OpenClaw4j-Bankend/**"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: OpenClaw4j-Bankend

jobs:
  native-profile-smoke:
    name: Native profile smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
          cache: maven

      - name: Verify native hints and build configuration
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          mvn -B -Dtest=MybatisPlusRuntimeHintsTest,LeydenBuildConfigurationTest test 2>&1 | tee target/ci-logs/native-profile-tests.log

      - name: Package native experiment without native-image
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          mvn -B -Pnative-experiment -DskipNativeBuild=true -DskipTests package 2>&1 | tee target/ci-logs/native-profile-package.log

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-native-smoke-logs-${{ github.run_attempt }}
          path: OpenClaw4j-Bankend/target/ci-logs/**
          if-no-files-found: ignore

  graalvm-native-compile:
    name: GraalVM native compile
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm-community
          java-version: "26"
          cache: maven
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compile native executable
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          mvn -B -Pnative-experiment -DskipNativeBuild=false -DskipTests native:compile 2>&1 | tee target/ci-logs/graalvm-native-compile.log

      - name: Record native binary metadata
        run: |
          test -f target/OpenClaw4j-Bankend-native
          {
            echo "commit=${GITHUB_SHA}"
            echo "java_version=$(java -version 2>&1 | head -n 1)"
            echo "native_image_version=$(native-image --version 2>&1 | head -n 1)"
            ls -lh target/OpenClaw4j-Bankend-native
            file target/OpenClaw4j-Bankend-native
          } | tee target/ci-logs/native-binary-metadata.log

      - name: Upload native binary
        uses: actions/upload-artifact@v4
        with:
          name: openclaw4j-backend-native-linux-x64-${{ github.sha }}
          path: |
            OpenClaw4j-Bankend/target/OpenClaw4j-Bankend-native*
            OpenClaw4j-Bankend/target/ci-logs/native-binary-metadata.log
          if-no-files-found: error

      - name: Upload native compile logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-native-compile-logs-${{ github.run_attempt }}
          path: OpenClaw4j-Bankend/target/ci-logs/**
          if-no-files-found: ignore
