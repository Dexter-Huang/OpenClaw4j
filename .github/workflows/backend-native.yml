name: Backend Docker Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/backend-native.yml"
      - "OpenClaw4j-Bankend/**"
  pull_request:
    paths:
      - ".github/workflows/backend-native.yml"
      - "OpenClaw4j-Bankend/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend-build-smoke:
    name: Backend build smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: OpenClaw4j-Bankend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "26"
          cache: maven

      - name: Verify Leyden and native experiment configuration
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          mvn -B -Dtest=MybatisPlusRuntimeHintsTest,LeydenBuildConfigurationTest test 2>&1 | tee target/ci-logs/backend-build-tests.log

      - name: Package Leyden-ready jar
        run: |
          mkdir -p target/ci-logs
          set -o pipefail
          mvn -B -Pleyden -DskipTests package 2>&1 | tee target/ci-logs/leyden-package.log

      - name: Upload backend smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-build-smoke-logs-${{ github.run_attempt }}
          path: OpenClaw4j-Bankend/target/ci-logs/**
          if-no-files-found: ignore

  docker-image:
    name: Docker image with Leyden AOT
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/dexter-huang/openclaw4j-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and publish Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./OpenClaw4j-Bankend
          file: ./OpenClaw4j-Bankend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record Docker image metadata
        run: |
          mkdir -p OpenClaw4j-Bankend/target/ci-logs
          {
            echo "OPENCLAW4J_IMAGE_DIGEST=${{ steps.build.outputs.digest }}"
            echo "OPENCLAW4J_IMAGE_TAGS<<EOF"
            echo "${{ steps.meta.outputs.tags }}"
            echo "EOF"
            echo "OPENCLAW4J_IMAGE_SOURCE=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } | tee OpenClaw4j-Bankend/target/ci-logs/docker-image-metadata.log

      - name: Upload Docker image metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-docker-image-metadata-${{ github.run_attempt }}
          path: OpenClaw4j-Bankend/target/ci-logs/docker-image-metadata.log
          if-no-files-found: ignore
