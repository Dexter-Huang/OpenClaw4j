bind 0.0.0.0
port 26379
dir /data
protected-mode no
sentinel resolve-hostnames yes
sentinel announce-hostnames yes
sentinel monitor openclaw4j-master redis-master 6379 2
sentinel down-after-milliseconds openclaw4j-master 5000
sentinel failover-timeout openclaw4j-master 60000
sentinel parallel-syncs openclaw4j-master 1
