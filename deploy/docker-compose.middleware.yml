services:
  pgvector:
    image: pgvector/pgvector:pg18
    container_name: openclaw4j-pgvector
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openclaw4j}
      POSTGRES_USER: ${POSTGRES_USER:-openclaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-openclaw}
      TZ: Asia/Shanghai
    volumes:
      - ./data/pgvector:/var/lib/postgresql
      - ../OpenClaw4j-Bankend/src/main/resources/sql/PostgreSQL/V0.0.1__init.sql:/docker-entrypoint-initdb.d/01-openclaw4j-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis-master:
    image: redis:7
    container_name: openclaw4j-redis-master
    restart: unless-stopped
    ports:
      - "${REDIS_MASTER_PORT:-6379}:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis-master.conf:/usr/local/etc/redis/redis.conf:ro
      - ./data/redis-master:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis-replica-1:
    image: redis:7
    container_name: openclaw4j-redis-replica-1
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    ports:
      - "${REDIS_REPLICA_1_PORT:-6380}:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis-replica-1.conf:/usr/local/etc/redis/redis.conf:ro
      - ./data/redis-replica-1:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli INFO replication | grep -q 'role:slave' && redis-cli INFO replication | grep -q 'master_link_status:up'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis-replica-2:
    image: redis:7
    container_name: openclaw4j-redis-replica-2
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
    ports:
      - "${REDIS_REPLICA_2_PORT:-6381}:6379"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis-replica-2.conf:/usr/local/etc/redis/redis.conf:ro
      - ./data/redis-replica-2:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli INFO replication | grep -q 'role:slave' && redis-cli INFO replication | grep -q 'master_link_status:up'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 5s

  redis-sentinel-1:
    image: redis:7
    container_name: openclaw4j-redis-sentinel-1
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    ports:
      - "${REDIS_SENTINEL_1_PORT:-26379}:26379"
    command:
      - sh
      - -c
      - cp /usr/local/etc/redis/sentinel.conf /data/sentinel.conf && redis-sentinel /data/sentinel.conf
    volumes:
      - ./redis/sentinel-1.conf:/usr/local/etc/redis/sentinel.conf:ro
      - ./data/redis-sentinel-1:/data

  redis-sentinel-2:
    image: redis:7
    container_name: openclaw4j-redis-sentinel-2
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    ports:
      - "${REDIS_SENTINEL_2_PORT:-26380}:26379"
    command:
      - sh
      - -c
      - cp /usr/local/etc/redis/sentinel.conf /data/sentinel.conf && redis-sentinel /data/sentinel.conf
    volumes:
      - ./redis/sentinel-2.conf:/usr/local/etc/redis/sentinel.conf:ro
      - ./data/redis-sentinel-2:/data

  redis-sentinel-3:
    image: redis:7
    container_name: openclaw4j-redis-sentinel-3
    restart: unless-stopped
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    ports:
      - "${REDIS_SENTINEL_3_PORT:-26381}:26379"
    command:
      - sh
      - -c
      - cp /usr/local/etc/redis/sentinel.conf /data/sentinel.conf && redis-sentinel /data/sentinel.conf
    volumes:
      - ./redis/sentinel-3.conf:/usr/local/etc/redis/sentinel.conf:ro
      - ./data/redis-sentinel-3:/data
