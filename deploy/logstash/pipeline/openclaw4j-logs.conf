input {
  file {
    id => "openclaw4j-backend-logs"
    path => [
      "/var/log/openclaw4j/**/*.log"
    ]
    start_position => "beginning"
    sincedb_path => "/usr/share/logstash/data/openclaw4j-backend-logs.sincedb"
    mode => "tail"
    codec => multiline {
      pattern => "^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d{3}"
      negate => true
      what => "previous"
      auto_flush_interval => 2
    }
  }
}

filter {
  grok {
    match => {
      "message" => "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{NUMBER:relative_ms:int}\s+\[%{DATA:thread.name}\]\s+%{LOGLEVEL:log.level}\s+%{DATA:log.logger}\s+-\s+%{GREEDYDATA:event.original}"
    }
    tag_on_failure => ["_openclaw4j_log_grok_failure"]
  }

  date {
    match => ["log_timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
    timezone => "Asia/Shanghai"
    target => "@timestamp"
  }

  mutate {
    add_field => {
      "[service][name]" => "openclaw4j-backend"
      "[service][environment]" => "local"
      "[event][dataset]" => "openclaw4j.backend"
    }
    remove_field => ["log_timestamp"]
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "${ELASTICSEARCH_USERNAME}"
    password => "${ELASTICSEARCH_PASSWORD}"
    ilm_enabled => false
    manage_template => false
    index => "openclaw4j-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
