    maxPoolSize: 50
    minPoolSize: 1

rules:
  - !READWRITE_SPLITTING
    dataSourceGroups:
      ds_0:
        writeDataSourceName: ds_0_primary
        readDataSourceNames:
          - ds_0_replica
        loadBalancerName: round_robin
      ds_1:
        writeDataSourceName: ds_1_primary
        readDataSourceNames:
          - ds_1_replica
        loadBalancerName: round_robin
    loadBalancers:
      round_robin:
        type: ROUND_ROBIN
  - !SHARDING
    tables:
      workspace:
        actualDataNodes: ds_${0..1}.workspace
        databaseStrategy:
          standard:
            shardingColumn: workspace_id
            shardingAlgorithmName: workspace_inline
    defaultDatabaseStrategy:
      none:
    shardingAlgorithms:
      workspace_inline:
        type: INLINE
        props:
          algorithm-expression: ds_${Math.abs(workspace_id.hashCode()) % 2}
  - !SINGLE
    tables:
      - ds_0.account
      - ds_0.agent_schema
      - ds_0.api_key
      - ds_0.application
      - ds_0.application_component
      - ds_0.application_version
      - ds_0.document
      - ds_0.knowledge_base
      - ds_0.mcp_server
      - ds_0.model
      - ds_0.plugin
      - ds_0.provider
      - ds_0.reference
      - ds_0.tool
      - ds_0.dataset
      - ds_0.dataset_version
      - ds_0.dataset_item
      - ds_0.evaluator
      - ds_0.evaluator_version
      - ds_0.evaluator_template
      - ds_0.experiment
      - ds_0.experiment_result
      - ds_0.prompt
      - ds_0.prompt_version
      - ds_0.prompt_build_template
      - ds_0.model_config
    defaultDataSource: ds_0
