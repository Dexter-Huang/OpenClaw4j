server:
  port: 9004
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript
    min-response-size: 2048

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: OpenClaw4j-Bankend
  profiles:
    active: dev
  messages:
    basename: i18n/messages
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  datasource:
    url: ${OPENCLAW_DB_URL:jdbc:postgresql://127.0.0.1:5432/openclaw4j}
    username: ${OPENCLAW_DB_USERNAME:openclaw}
    password: ${OPENCLAW_DB_PASSWORD:openclaw}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 虚拟线程环境下，适当提高连接数
      # 但不要无限拉高——数据库端连接是有限的
      maximum-pool-size: 50
      # 连接等待超时适当缩短，快速失败而非长时间堵塞
      connection-timeout: 3000
      # 连接最大生命周期，防止数据库侧超时
      max-lifetime: 1800000
    connection-fetch: lazy
  data:
    redis:
      sentinel:
        master: ${OPENCLAW_REDIS_SENTINEL_MASTER:openclaw4j-master}
        nodes: ${OPENCLAW_REDIS_SENTINEL_NODES:127.0.0.1:26379,127.0.0.1:26380,127.0.0.1:26381}
        nat-map: ${OPENCLAW_REDIS_SENTINEL_NAT_MAP:redis-master:6379=127.0.0.1:6379,redis-replica-1:6379=127.0.0.1:6380,redis-replica-2:6379=127.0.0.1:6381}
        username: ${OPENCLAW_REDIS_SENTINEL_USERNAME:}
        password: ${OPENCLAW_REDIS_SENTINEL_PASSWORD:}
      password: ${OPENCLAW_REDIS_PASSWORD:}
      database: ${OPENCLAW_REDIS_DATABASE:0}
  sql:
    init:
      mode: never
      continue-on-error: false
  ai:
    alibaba:
      studio:
        login-method: third_party
        upload-method: file       # file or oss
        # Vector store backend: simple | pgvector
        vector-store-type: pgvector
    vectorstore:
      pgvector:
        schema-name: openclaw_rag
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
    chat:
      observations:
        log-prompt: true # Include prompt content in tracing (disabled by default for privacy)
        log-completion: true
    dashscope:
      api-key: sk-fe87436622344410af346152a99853b5
    openai:
      api-key: sk-fe87436622344410af346152a99853b5
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen-max
  documentation:
    enabled: true
    swagger-ui:
      path: /swagger/doc.html
jwt:
  access-token-expiration: 7200
  refresh-token-expiration: 2592000

# Cache backend type: REDIS (persistent across backend restarts) or JVM (in-memory).
cache:
  type: REDIS

# Message queue backend type:
#   REDISSON  – Redis-backed pub/sub via Redisson (requires Redis, default)
#   ROCKET_MQ – Apache RocketMQ
#   JVM       – In-process pub/sub, no external broker required (single-node only)
mq:
  type: REDISSON
  endpoints: ${OPENCLAW_REDIS_SENTINEL_NODES:127.0.0.1:26379,127.0.0.1:26380,127.0.0.1:26381}
  document-index-topic: topic_saa_studio_document_index
  document_index_group: group_saa_studio_document_index

#oauth2:
#  github:
#    client-id: ${GITHUB_CLIENT_ID}
#    client-secret: ${GITHUB_CLIENT_SECRET}
#    redirect-uri: http://127.0.0.1:9004/oauth2/callback/github

mybatis-plus:
  global-config:
    db-config:
      db-type: postgre_sql
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler

seaskyland:
  ignore:
    whites:
      - /console
      - /graph-studio

logging:
  level:
    reactor.netty: ERROR
    okhttp3.internal: ERROR
    com.obs: ERROR

management:
  tracing:
    sampling:
      probability: 1.0 # Sample 100% of requests for full tracing (adjust in production as needed)
  observations:
    annotations:
      enabled: true # Enable @Observed (if you use observation annotations in code)

