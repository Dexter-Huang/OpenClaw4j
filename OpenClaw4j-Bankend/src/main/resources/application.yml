server:
  port: 9004
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript
    min-response-size: 2048

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: OpenClaw4j-Bankend
  profiles:
    active: dev
  messages:
    basename: i18n/messages
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  datasource:
    url: ${OPENCLAW_MYSQL_URL:jdbc:mysql://127.0.0.1:3306/openclaw4j?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${OPENCLAW_MYSQL_USERNAME:openclaw}
    password: ${OPENCLAW_MYSQL_PASSWORD:openclaw123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      # 虚拟线程环境下，适当提高连接数
      # 但不要无限拉高——数据库端连接是有限的
      maximum-pool-size: 50
      # 连接等待超时适当缩短，快速失败而非长时间堵塞
      connection-timeout: 3000
      # 连接最大生命周期，防止数据库侧超时
      max-lifetime: 1800000
    connection-fetch: lazy
  data:
    redis:
      host: ${OPENCLAW_REDIS_HOST:127.0.0.1}
      port: ${OPENCLAW_REDIS_PORT:6379}
      password: ${OPENCLAW_REDIS_PASSWORD:}
      database: ${OPENCLAW_REDIS_DATABASE:0}
  sql:
    init:
      mode: never
      schema-locations: classpath:sql/MySQL/V0.0.1__init.sql
      continue-on-error: false
  ai:
    alibaba:
      studio:
        login-method: third_party
        upload-method: file       # file or oss
        # Vector store backend: simple | elasticsearch
        vector-store-type: simple
    chat:
      observations:
        log-prompt: true # Include prompt content in tracing (disabled by default for privacy)
        log-completion: true
    dashscope:
      api-key: sk-fe87436622344410af346152a99853b5
    openai:
      api-key: sk-fe87436622344410af346152a99853b5
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      chat:
        options:
          model: qwen-max
  documentation:
    enabled: true
    swagger-ui:
      path: /swagger/doc.html
jwt:
  access-token-expiration: 7200
  refresh-token-expiration: 2592000

# Cache backend type: REDIS (persistent across backend restarts) or JVM (in-memory).
cache:
  type: REDIS

# Message queue backend type:
#   REDISSON  – Redis-backed pub/sub via Redisson (requires Redis, default)
#   ROCKET_MQ – Apache RocketMQ
#   JVM       – In-process pub/sub, no external broker required (single-node only)
mq:
  type: JVM
  endpoints: 127.0.0.1:6380
  document-index-topic: topic_saa_studio_document_index
  document_index_group: group_saa_studio_document_index

#oauth2:
#  github:
#    client-id: ${GITHUB_CLIENT_ID}
#    client-secret: ${GITHUB_CLIENT_SECRET}
#    redirect-uri: http://127.0.0.1:9004/oauth2/callback/github

mybatis-plus:
  global-config:
    db-config:
      db-type: mysql
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler

seaskyland:
  ignore:
    whites:
      - /console
      - /graph-studio

logging:
  level:
    reactor.netty: ERROR
    okhttp3.internal: ERROR
    com.obs: ERROR

management:
  tracing:
    sampling:
      probability: 1.0 # Sample 100% of requests for full tracing (adjust in production as needed)
  observations:
    annotations:
      enabled: true # Enable @Observed (if you use observation annotations in code)

